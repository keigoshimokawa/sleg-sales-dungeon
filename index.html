              <p style={{ fontSize: '0.9rem', color: 'var(--color-secondary)' }}>{result.bottleneck}</p>
              <h4 style={{ color: 'var(--color-primary)', marginTop: '1rem' }}>ADVICE</h4>
              <ul style={{ fontSize: '0.85rem', paddingLeft: '20px' }}>
                {result.improvement_plan.what_to_say.map((s, i) => <li key={i}>{s}</li>)}
              </ul>
            </div>
            <button className="btn-primary" onClick={onClose} style={{ width: '100%', marginTop: '1.5rem' }}>戻る</button>
          </div>
        </div>
      );
    };

    // --- MAIN APP COMPONENT ---
    const App = () => {
      const [currentView, setCurrentView] = useState('MAP');
      const currentViewRef = useRef('MAP');
      useEffect(() => { currentViewRef.current = currentView; }, [currentView]);
      const [users, setUsers] = useState([]);
      const [logs, setLogs] = useState([]);
      const [scenarios, setScenarios] = useState([]);
      const [isLoading, setIsLoading] = useState(true);
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [myIdentity, setMyIdentity] = useState(null);
      const [geminiKey, setGeminiKey] = useState(null); // フロントエンド評価用のキー保持

      const [showToast, setShowToast] = useState(false);
      const [toastMessage, setToastMessage] = useState('');
      const [isErrorToast, setIsErrorToast] = useState(false);
      const toastTimerRef = useRef(null);

      // エラー通知（手動で閉じるまで消えない）
      const showErrorToast = (msg) => {
        if (toastTimerRef.current) clearTimeout(toastTimerRef.current);
        setToastMessage('❌ ' + msg);
        setIsErrorToast(true);
        setShowToast(true);
      };

      // 情報通知（3秒で自動消去）
      const showInfoToast = (msg, durationMs = 3000) => {
        if (toastTimerRef.current) clearTimeout(toastTimerRef.current);
        setToastMessage(msg);
        setIsErrorToast(false);
        setShowToast(true);
        if (durationMs > 0) {
          toastTimerRef.current = setTimeout(() => setShowToast(false), durationMs);
        }
      };
      const handleUpdateMapNode = (level, stage, newNode) => {
        setStages(prev => {
          const idx = prev.findIndex(s => s.level === level && s.stage === stage);
          if (idx > -1) {
            const next = [...prev];
            next[idx] = { ...next[idx], ...newNode };
            return next;
          }
          return [...prev, { level, stage, ...newNode }];
        });
      };

      const handleSaveMapNodeToDB = async (node) => {
        setIsSubmitting(true);
        try {
          const res = await fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({ action: 'updateMasterStage', ...node })
          });
          const d = await res.json();
          if (d.success) {
            showInfoToast(`${node.level} ${node.stage} の設定を保存しました`);
            fetchAllData();
          }
        } catch (e) { showErrorToast(e.message); }
        setIsSubmitting(false);
      };

      const [selectedBoss, setSelectedBoss] = useState(null);
      const [duoSession, setDuoSession] = useState(null); // { mode: 'HOST'|'JOIN', targetName: string, level: string, stage: string }
      const [prompts, setPrompts] = useState([]);
      const [stages, setStages] = useState([]);
      const [recruitmentRooms, setRecruitmentRooms] = useState([]);
      const [mapNodes, setMapNodes] = useState([]);
      const [selectedNode, setSelectedNode] = useState(null);
      const [aiResult, setAIResult] = useState(null);

      const handleDuoChallenge = async (user, mode) => {
        if (user?.isTest) {
          setDuoSession({ mode: 'TEST', targetName: 'TESTING' });
          setCurrentView('DUO_RECORD');
          return;
        }
        // Direct invite remains as a legacy for BOSS/ADMIN? Or just remove.
        // For now, let's keep it but it might lack stage info.
        setDuoSession({ mode, targetName: user.name });
        setCurrentView('DUO_RECORD');
      };

      const handleCreateRoom = async (node, stage) => {
        setIsSubmitting(true);
        try {
          const res = await fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({ action: 'createRecruitmentRoom', hostName: myIdentity.name, level: node.level, stage: stage })
          });
          const d = await res.json();
          if (d.success) {
            showInfoToast(`ステージ ${stage} の募集を開始しました！`);
            setDuoSession({ mode: 'HOST', targetName: 'WAITING', level: node.level, stage: stage });
            setCurrentView('DUO_RECORD');
          }
        } catch (e) { showErrorToast(e.message); }
        setIsSubmitting(false);
      };

      const handleCancelRoom = async () => {
        setIsSubmitting(true);
        try {
          const res = await fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({ action: 'stopHosting', userFullName: myIdentity.name })
          });
          const d = await res.json();
          if (d.success) {
            showInfoToast(`募集を解除しました`);
            fetchAllData();
          }
        } catch (e) { showErrorToast(e.message); }
        setIsSubmitting(false);
      };

      const handleJoinRoom = async (room) => {
        setDuoSession({ mode: 'JOIN', targetName: room.hostName, level: room.level, stage: room.stage });
        setCurrentView('DUO_RECORD');
      };

      const handleBossRequest = async (node) => {
        setIsSubmitting(true);
        try {
          const res = await fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({ 
              action: 'notifyBossBattle', 
              userFullName: myIdentity.name, 
              level: node.level,
              bossName: node.bossName
            })
          });
          const d = await res.json();
          if (d.success) {
            showInfoToast('ボス戦の申し込みをSlackに通知しました！日程の連絡をお待ちください。');
          }
        } catch (e) { showErrorToast(e.message); }
        setIsSubmitting(false);
      };

      const handleAIChallenge = (node) => {
        alert('この階層をクリアするには、掲示板から募集に参加するか、自分で募集を出してください。');
      };

      useEffect(() => {
        try {
          const saved = localStorage.getItem('sleg_identity');
          if (saved) {
            const parsed = JSON.parse(saved);
            setMyIdentity(parsed);
          }
        } catch (e) { localStorage.removeItem('sleg_identity'); }
        fetchAllData();
        const interval = setInterval(fetchAllData, 10000);
        return () => clearInterval(interval);
      }, []);

      const fetchAllData = async () => {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 10000); // 10秒でタイムアウト

        try {
          console.log("Fetching data from GAS...");
          const res = await fetch(`${GAS_URL}?_=${Date.now()}`, { signal: controller.signal });
          clearTimeout(timeoutId);
          
          if (!res.ok) throw new Error(`HTTP Error: ${res.status}`);
          const data = await res.json();
          
          if (data.users) {
            const rooms = data.rooms || [];
            const activeHostNames = rooms.map(r => r.hostName);
            const updatedUsers = data.users.map((u, i) => ({
              id: u['ユーザー名'] || `u${i}`, name: u['ユーザー名'] || 'Unknown',
              currentLevel: (u['現在の階層'] || 'LEVEL0'),
              email: u['メールアドレス'] || '', slackId: u['SlackID'] || '',
              role: u['権限'] || 'PLAYER',
              exp: parseInt(u['総合EXP'] || 0), avatarUrl: u['アイコン画像URL'] || null,
              isHosting: activeHostNames.includes(u['ユーザー名']),
              hasPassword: !!(u['パスワード'] && u['パスワード'].trim() !== '')
            }));
            setUsers(updatedUsers);
            
            if (myIdentity) {
              const freshMe = updatedUsers.find(u => u.name === myIdentity.name);
              if (freshMe && (freshMe.role !== myIdentity.role || freshMe.currentLevel !== myIdentity.currentLevel)) {
                setMyIdentity(freshMe);
                localStorage.setItem('sleg_identity', JSON.stringify(freshMe));
              }
            }
          }
          if (data.stages && Array.isArray(data.stages)) {
            const mappedStages = data.stages.filter(s => s && s.level && s.stage).map(s => ({
              ...s,
              quests: typeof s.quests === 'string' ? s.quests.split('|') : (s.quests || []),
              x: parseInt(s.x || 50), y: parseInt(s.y || 50)
            }));

            // MASTER画面表示中、または入力フォーカス中はDBからの同期をスキップして入力を保護
            const isEditing = currentViewRef.current === 'MASTER' || 
                             ['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName);
            
            if (!isEditing) {
              setStages(mappedStages);
              const allNodes = [...mappedStages].sort((a,b) => {
                const lvlA = String(a.level || '');
                const lvlB = String(b.level || '');
                if (lvlA !== lvlB) return lvlA.localeCompare(lvlB);
                return String(a.stage || '').localeCompare(String(b.stage || ''));
              });
              setMapNodes(allNodes);
            }
          }
          if (data.rooms) setRecruitmentRooms(data.rooms);
          if (data.geminiKey) setGeminiKey(data.geminiKey);
          if (data.scenarios) setScenarios(data.scenarios);
          setLogs(data.logs || []);
          console.log("Data fetch successful.");
        } catch (e) {
          console.error('Fetch Error:', e);
          if (e.name === 'AbortError') showErrorToast("通信タイムアウト: GASの応答がありません");
          else showErrorToast("データ取得失敗: " + e.message);
        } finally {
          setIsLoading(false);
          clearTimeout(timeoutId);
        }
      };

      const handleLogin = async (user, password) => {
        if (user.hasPassword) {
          try {
            const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'verifyPassword', name: user.name, password }) });
            if (!(await res.json()).success) return false;
          } catch (e) { showErrorToast(e.message); return false; }
        }
        setMyIdentity(user);
        localStorage.setItem('sleg_identity', JSON.stringify(user));
        return true;
      };

      const logout = () => { localStorage.removeItem('sleg_identity'); setMyIdentity(null); };

      const handleSaveUser = async (u) => {
        setIsSubmitting(true);
        // 日本語ヘッダーへのマッピング
        const payload = { 
          action: 'saveUser', 
          // 念のため旧英語キーも送信
          name: u.name,
          id: u.id,
          currentLevel: u.currentLevel,
          role: u.role,
          email: String(u.email || ''),
          slackId: String(u.slackId || ''),
          avatarUrl: String(u.avatarUrl || ''),
          exp: Number(u.exp || 0),
          // 日本語キー
          'ユーザー名': u.name,
          '現在の階層': u.currentLevel,
          '権限': u.role,
          'メールアドレス': String(u.email || ''),
          'SlackID': String(u.slackId || ''),
          'アイコン画像URL': String(u.avatarUrl || ''),
          '総合EXP': Number(u.exp || 0)
        };
        if (u.newPassword) payload.password = u.newPassword;
        try {
          const res = await fetch(GAS_URL, { 
            method: 'POST', 
            body: JSON.stringify(payload)
          });
          const d = await res.json();
          if (d.success) {
            showInfoToast('保存完了 ✅');
            // Optimistically update the UI to prevent immediate reversion from stale GET requests
            setUsers(prev => prev.map(user => user.id === u.id ? { ...user, ...u } : user));
            if (myIdentity && myIdentity.name === u.name) {
              const freshMe = { ...myIdentity, ...u };
              setMyIdentity(freshMe);
              localStorage.setItem('sleg_identity', JSON.stringify(freshMe));
            }
            
            // Wait 2.5 seconds to ensure GAS Spreadsheet App flushes to disk before refetching
            await new Promise(r => setTimeout(r, 2500));
            await fetchAllData();
            setIsSubmitting(false);
            return true;
          } else {
            showErrorToast('エラー: ' + (d.error || '不明なエラーです。GAS側の保存に失敗しました。'));
          }
        } catch (e) {
          showErrorToast('通信エラー: ' + e.message);
        }
        setIsSubmitting(false);
        return false;
      };

      const handleAddUser = async (name) => {
        setIsSubmitting(true);
        await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'addUser', name }) });
        await fetchAllData();
        setIsSubmitting(false);
      };

      const handleSaveScenario = async (scenario) => {
        setIsSubmitting(true);
        try {
          const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'saveScenario', scenario }) });
          const d = await res.json();
          if (d.success) { showInfoToast('シナリオを保存しました ✅'); fetchAllData(); }
          else { showErrorToast(d.error); }
        } catch (e) { showErrorToast(e.message); }
        setIsSubmitting(false);
      };

      const handleDeleteScenario = async (id) => {
        setIsSubmitting(true);
        try {
          const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'deleteScenario', id }) });
          const d = await res.json();
          if (d.success) { showInfoToast('削除しました 🗑️'); fetchAllData(); }
          else { showErrorToast(d.error); }
        } catch (e) { showErrorToast(e.message); }
        setIsSubmitting(false);
      };

      const onRecordingComplete = async (data) => {
        setIsSubmitting(true);
        showInfoToast('動画をアップロードしています...', 0);

        try {
          console.log(`[送信開始] 動画サイズ: ${(data.videoBlob.size / 1024 / 1024).toFixed(2)} MB`);
          let fileId = '';

          // ==========================================
          // 1. Google Drive へのダイレクトアップロード
          // ==========================================
          try {
            const initRes = await fetch(GAS_URL, {
              method: 'POST',
              body: new URLSearchParams({ payload: JSON.stringify({ action: 'getDriveUploadUrl', userFullName: myIdentity.name, timestamp: Date.now() }) })
            });
            const initData = await initRes.json();
            if (initData.success && initData.uploadUrl) {
              const uploadRes = await fetch(initData.uploadUrl, { method: 'PUT', body: data.videoBlob });
              const uploadData = await uploadRes.json();
              fileId = uploadData.id;
            }
          } catch (e) { console.warn("Drive Upload missed, but continuing to AI", e); }

          let aiResultObj = null;

          // ==========================================
          // 2. Gemini APIフロントエンド直接解析 (スコア対象者のみ)
          // ==========================================
          if (data.role === 'ROLEPLAYER') {
            if (!geminiKey) throw new Error("Gemini APIキーが取得できませんでした。");
            showInfoToast('AIが動画を分析しています... (数十秒〜数分かかります)', 0);

            // 優先順位: 1. ステージ別プロンプト (MAP) 2. シナリオの悩み情報 3. デフォルト
            const currentStage = stages.find(s => s.level === (duoSession?.level || myIdentity?.currentLevel) && s.stage === duoSession?.stage);
            const stagePrompt = currentStage?.prompt;
            const scenarioInfo = duoSession?.persona ? `今日のターゲット顧客: ${duoSession.persona.name} (${duoSession.persona.gender}, ${duoSession.persona.grade})\n顧客の状況・悩み: ${duoSession.persona.worry}` : '';
            
            const myPromptTemplate = stagePrompt || scenarioInfo || "あなたはセールスコーチです。";

            // TESTモード用プロンプト（話さなくてもOK・顔映るだけでパス）
            const testPrompt = `これはシステムの動作テスト用の録画です。映像が届いていれば内容は問いません。
以下のJSONのみで回答してください。余計なテキストやMarkdownは含めないでください:
{"summary":"テスト録画を正常に受信しました。AIフィードバックのパイプラインは正常に動作しています。","R_phase_evaluation":{"total_score":85,"is_passed":true},"bottleneck":"テストモードのため評価スキップ。","improvement_plan":{"what_to_say":["テスト成功！実際のロープレでAI評価をやってみてください。"]}}`;

            // 話者分離の補足だけを追加する
            const speakerNote = "\n\n【重要】動画内の音声から『営業役（修練者）』と『顧客役（保護者または生徒）』の声を精緻に聞き分け、営業役の発言内容のみを評価対象としてください。出力は必ずJSONのみとし、余計なテキストやMarkdownは含めないでください。";
            const systemPrompt = data.isTest
              ? testPrompt
              : myPromptTemplate
                ? myPromptTemplate + speakerNote
                : "あなたはセールスコーチです。" + speakerNote + "\n以下のJSONスキーマで回答してください: {\"summary\":\"\",\"R_phase_evaluation\":{\"total_score\":0,\"is_passed\":false},\"bottleneck\":\"\",\"improvement_plan\":{\"what_to_say\":[]}}";

            // Gemini File API (Resumable Upload)
            const geminiUploadRes = await fetch(`https://generativelanguage.googleapis.com/upload/v1beta/files?key=${geminiKey}`, {
              method: 'POST',
              headers: {
                'X-Goog-Upload-Protocol': 'resumable',
                'X-Goog-Upload-Command': 'start',
                'X-Goog-Upload-Header-Content-Length': data.videoBlob.size,
                'X-Goog-Upload-Header-Content-Type': data.contentType,
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({ file: { display_name: `rp_${Date.now()}.webm` } })
            });

            const geminiUploadUrl = geminiUploadRes.headers.get('x-goog-upload-url');
            if (!geminiUploadUrl) throw new Error("Gemini Upload開始エラー");

            const geminiPutRes = await fetch(geminiUploadUrl, {
              method: 'POST',
              headers: { 'X-Goog-Upload-Command': 'upload, finalize', 'X-Goog-Upload-Offset': '0' },
              body: data.videoBlob
            });

            const geminiFileData = await geminiPutRes.json();
            if (!geminiFileData.file) {
              console.error('[Gemini] アップロードレスポンスエラー:', geminiFileData);
              throw new Error(`Geminiファイルアップロード失敗: ${geminiFileData.error?.message || JSON.stringify(geminiFileData).substring(0, 100)}`);
            }
            const geminiFileUri = geminiFileData.file.uri;

            // Backend処理の完了待機 (PROCESSING待ち)
            let fileState = geminiFileData.file.state;
            if (fileState === 'FAILED') {
              console.error('[Gemini] アップロード直後FAILED:', geminiFileData.file);
              throw new Error(`Geminiファイルが即座にFAILEDになりました。動画形式(${data.contentType})が非対応の可能性があります。`);
            }
            while (fileState === 'PROCESSING') {
              await new Promise(r => setTimeout(r, 2000));
              const checkRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/${geminiFileData.file.name}?key=${geminiKey}`);
              const checkData = await checkRes.json();
              console.log('[Gemini] ファイル状態:', checkData.state, checkData);
              fileState = checkData.state;
              if (fileState === 'FAILED') {
                const reason = checkData.error?.message || checkData.statusDetail || '詳細不明';
                throw new Error(`Gemini処理失敗: ${reason}`);
              }
            }

            // 【根本解決】APIキーが利用できるモデル一覧を動的に取得し、確実に存在するモデルを指定する
            const modelsRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${geminiKey}`);
            const modelsData = await modelsRes.json();
            const availableModels = modelsData.models || [];
            // モデル優先順位: 安定性重視（1.5-flash最優先）
            const targetModel = availableModels.find(m => m.name === 'models/gemini-1.5-flash' && (m.supportedGenerationMethods || []).includes('generateContent'))
              || availableModels.find(m => m.name === 'models/gemini-1.5-pro' && (m.supportedGenerationMethods || []).includes('generateContent'))
              || availableModels.find(m => m.name === 'models/gemini-2.5-flash' && (m.supportedGenerationMethods || []).includes('generateContent'))
              || availableModels.find(m => m.name === 'models/gemini-2.5-pro' && (m.supportedGenerationMethods || []).includes('generateContent'))
              // 最終フォールバック（preview / experimental / 2.0系は除外）
              || availableModels.find(m => m.name.includes('gemini') && !m.name.includes('preview') && !m.name.includes('exp') && !m.name.includes('2.0') && (m.supportedGenerationMethods || []).includes('generateContent'))
              || availableModels.find(m => m.name.includes('gemini') && !m.name.includes('2.0') && (m.supportedGenerationMethods || []).includes('generateContent'));

            if (!targetModel) {
              console.error("Available Models:", modelsData);
              throw new Error(`このAPIキーで利用可能なGeminiモデルが見つかりません。利用可能一覧: ${availableModels.map(m => m.name).join(', ')}`);
            }

            // 推論実行（高負荷エラー時は最大3回自動リトライ）
            let generateData;
            const maxRetry = 3;
            for (let attempt = 1; attempt <= maxRetry; attempt++) {
              const generateRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/${targetModel.name}:generateContent?key=${geminiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  contents: [{ parts: [{ file_data: { mime_type: data.contentType, file_uri: geminiFileUri } }, { text: systemPrompt }] }]
                })
              });
              generateData = await generateRes.json();
              // 高負荷エラー(503/overloaded)の場合はリトライ
              if (generateData.error && (generateData.error.code === 503 || (generateData.error.message || '').toLowerCase().includes('high demand') || (generateData.error.message || '').toLowerCase().includes('overload'))) {
                if (attempt < maxRetry) {
                  setToastMessage(`⏳ AIが混み合っています。${attempt * 5}秒後に再試行します... (${attempt}/${maxRetry})`);
                  await new Promise(r => setTimeout(r, attempt * 5000));
                  continue;
                }
              }
              break; // エラーなし or リトライ対象外のエラーは即break
            }
            if (generateData.error) throw new Error(generateData.error.message);
            const responseText = generateData.candidates[0].content.parts[0].text;
            aiResultObj = JSON.parse(responseText.replace(/```json|```/g, ''));
          }

          // ==========================================
          // 3. GASへ「最終結果テキスト」だけを格納
          // ==========================================
          showInfoToast('結果をログに保存しています...', 0);
          const savePayload = {
            action: 'saveEvaluationResult',
            userFullName: myIdentity.name,
            isDuo: data.isDuo,
            fileId: fileId,
            aiResult: aiResultObj || {
              R_phase_evaluation: { is_passed: false, total_score: 0 },
              summary: 'パートナー側でのサポート通信のため、AI評価は実行者側に記録されます',
              bottleneck: '-', improvement_plan: { what_to_say: ['-'] }
            }
          };

          const res = await fetch(GAS_URL, {
            method: 'POST',
            body: new URLSearchParams({ payload: JSON.stringify(savePayload) })
          });
          const result = await res.json();

          if (result.success) {
            if (data.isDuo) {
              await fetch(GAS_URL, { method: 'POST', body: new URLSearchParams({ payload: JSON.stringify({ action: 'stopHosting', userFullName: myIdentity.name }) }) }).catch(e => e);
            }
            if (aiResultObj) setAIResult(aiResultObj);
            setCurrentView('MAP');
            setTimeout(() => fetchAllData(), 3000);
          } else {
            alert("GAS記録エラー: " + result.error);
          }
        } catch (e) {
          console.error("Super Architecture Error:", e);
          showErrorToast(e.message);
          setIsSubmitting(false);
          return;
        }

        setShowToast(false);
        setIsSubmitting(false);
      };

      if (isLoading) return <div className="loader-pulse" style={{ textAlign: 'center', marginTop: '45vh' }}>INITIALIZING DUNGEON...</div>;

      if (!myIdentity) return <LoginScreen users={users} onSelect={handleLogin} onAddUser={handleAddUser} />;

      const isBoss = myIdentity?.role === 'BOSS';

      return (
        <React.Fragment>
          <div className="background-animation"></div>
          <header className="nav-header glass-container">
            <h1 className="title-cyber" style={{ margin: 0, fontSize: '1.4rem' }}>SLEG <span style={{ color: 'var(--color-primary)' }}>SALES</span> DUNGEON</h1>
            <div className="nav-links">
              <button className={`nav-btn ${currentView === 'MAP' ? 'active' : ''}`} onClick={() => { setCurrentView('MAP'); setAIResult(null); }}>MAP</button>
              <button className={`nav-btn ${currentView === 'STATS' ? 'active' : ''}`} onClick={() => { setCurrentView('STATS'); setAIResult(null); }}>STATS</button>
              {(myIdentity?.role === 'ADMIN' || myIdentity?.role === 'MASTER') && <button className={`nav-btn ${currentView === 'MASTER' ? 'active' : ''}`} onClick={() => { setCurrentView('MASTER'); setAIResult(null); }}>MASTER</button>}
              {(myIdentity?.role === 'ADMIN' || myIdentity?.role === 'BOSS') && <button className={`nav-btn ${currentView === 'GRADING' ? 'active' : ''}`} style={{ borderBottom: '2px solid var(--color-gold)' }} onClick={() => { setCurrentView('GRADING'); setAIResult(null); }}>GRADING</button>}
              <button className="nav-btn" onClick={logout} style={{ opacity: 0.6, fontSize: '0.8rem' }}>LOGOUT</button>
            </div>

            {/* DUO Invite Notification (Removed) */}
          </header>

          <main className="app-content">
            {currentView === 'MAP' && (
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 300px', gap: '20px', height: '100%', width: '100%', maxWidth: '1400px', margin: '0 auto', boxSizing: 'border-box' }}>
                <DungeonMap users={users} logs={logs} mapNodes={mapNodes} recruitmentRooms={recruitmentRooms} myName={myIdentity.name} onBossClick={(b) => { setSelectedBoss(b); setCurrentView('BATTLE'); }} onStageSelect={handleCreateRoom} onJoinRoom={handleJoinRoom} onCancelRoom={handleCancelRoom} onNodeSelect={setSelectedNode} selectedNode={selectedNode} currentLevel={myIdentity.currentLevel} />
                <div className="leaderboard-sidebar glass-container" style={{ display: 'flex', flexDirection: 'column', height: 'calc(100vh - 100px)' }}>
                  <h3 className="title-cyber" style={{ padding: '1.2rem', color: 'var(--color-primary)', borderBottom: '1px solid var(--glass-border)', margin: 0 }}>🏆 LEADERBOARD</h3>
                  <div className="leaderboard-content" style={{ flex: 1, overflowY: 'auto' }}>
                    {[...users].sort((a, b) => b.exp - a.exp).map((u, i) => (
                      <div key={u.id} className={`lb-user-card ${u.name === myIdentity.name ? 'is-me' : ''}`}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                          <div><span style={{ color: 'var(--color-gold)', fontWeight: 'bold' }}>#{i + 1}</span> <span style={{ fontWeight: 'bold' }}>{u.name}</span></div>
                          <span style={{ color: 'var(--color-primary)', fontWeight: 'bold' }}>{u.exp}</span>
                        </div>
                        <div className="exp-container"><div className="exp-bar" style={{ width: `${Math.min(100, (u.exp % 1000) / 10)}%` }}></div></div>
                        <div style={{ fontSize: '0.7rem', color: '#aaa', marginTop: '4px' }}>📍 {u.currentLevel}</div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}
            {currentView === 'STATS' && <StatsPage logs={logs} users={users} myName={myIdentity.name} onSelectLog={(log) => {
              if (log['詳細JSON']) {
                try {
                  setAIResult(JSON.parse(log['詳細JSON']));
                } catch (e) { console.error('Failed to parse log JSON', e); }
              }
            }} />}
            {currentView === 'MASTER' && <MasterAdminPage users={users} stages={stages} scenarios={scenarios} onSaveUser={handleSaveUser} onAddUser={handleAddUser} onSaveMapNode={handleUpdateMapNode} onSaveMapNodeToDB={handleSaveMapNodeToDB} onSaveScenario={handleSaveScenario} onDeleteScenario={handleDeleteScenario} onDuoChallenge={handleDuoChallenge} isSubmitting={isSubmitting} />}
            {currentView === 'DUO_RECORD' && <DuoRecordingView userFullName={myIdentity.name} mode={duoSession?.mode} targetName={duoSession?.targetName} scenarios={scenarios} onComplete={onRecordingComplete} onCancel={async () => {
              if (duoSession?.mode === 'HOST') {
                await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'stopHosting', userFullName: myIdentity.name }) });
              }
              setCurrentView('MAP');
              fetchAllData();
            }} />}
            {currentView === 'GRADING' && <BossGradingPage logs={logs} onEvaluate={async (d) => { setIsSubmitting(true); const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'handleBossEvaluation', ...d }) }); await fetchAllData(); setCurrentView('MAP'); setIsSubmitting(false); }} />}
            {currentView === 'BATTLE' && <BattleScreen myName={myIdentity.name} selectedNode={selectedBoss} onBattleComplete={async (d) => {
              setIsSubmitting(true);
              showInfoToast('ボス戦結果を記録しています...', 0);
              try {
                // 人間によるボス戦評価を「AI評価」と同じテーブル形式（ダミー項目）で保存しつつ、レベルアップフラグを付与
                const savePayload = {
                  action: 'saveEvaluationResult',
                  userFullName: myIdentity.name,
                  isDuo: false,
                  fileId: 'boss_evaluation', // ダミー
                  isBossBattle: true,
                  isLevelUp: d.isLevelUp,
                  level: d.level,
                  aiResult: {
                    R_phase_evaluation: { is_passed: d.passed, total_score: d.passed ? 100 : 0 },
                    summary: `【ボス戦評価】 評価者: ${d.partner}`,
                    bottleneck: d.passed ? '見事クリアしました！次の階層へ進みます。' : '再挑戦が必要です。',
                    improvement_plan: { what_to_say: ['-'] }
                  }
                };
                const res = await fetch(GAS_URL, {
                  method: 'POST',
                  body: new URLSearchParams({ payload: JSON.stringify(savePayload) })
                });
                const result = await res.json();
                if (result.success) {
                  showInfoToast(d.isLevelUp ? '✨ レベルアップしました！新しい階層が解放されます！' : '記録を保存しました ✅');
                  // Level Up の場合、フロント側でも即時反映
                  if (d.isLevelUp) {
                    const newIdentity = { ...myIdentity };
                    // 簡易的な階層インクリメント (LEVEL0 -> LEVEL1)
                    if (d.level) {
                      const num = parseInt(d.level.replace('LEVEL', '')) || 0;
                      newIdentity.currentLevel = `LEVEL${num + 1}`;
                    }
                    setMyIdentity(newIdentity);
                    localStorage.setItem('sleg_identity', JSON.stringify(newIdentity));
                  }
                  await fetchAllData();
                  setCurrentView('MAP');
                } else {
                  alert("エラー: " + result.error);
                }
              } catch (e) { showErrorToast(e.message); }
              setShowToast(false);
              setIsSubmitting(false);
            }} isSubmitting={isSubmitting} />}
          </main>

          <footer style={{ position: 'fixed', bottom: '10px', left: '10px', right: '10px', fontSize: '0.8rem', color: '#555', zIndex: 100, display: 'flex', flexWrap: 'wrap', gap: '5px' }}>
            <div style={{ marginRight: '15px' }}>
              PLAYER: <span style={{ color: 'var(--color-primary)' }}>{myIdentity?.name || 'GUEST'}</span> {isBoss && <span className="status-badge status-pending" style={{ marginLeft: '10px', verticalAlign: 'middle' }}>BOSS</span>}
            </div>
            {/* 近くにいるプレイヤーなどのアイコンがここに追加される場合、flex-wrapで折り返されます */}
          </footer>

          {selectedNode && (
            <StageDetailModal
              node={selectedNode}
              onClose={() => setSelectedNode(null)}
              logs={logs}
              onDuoStart={(n) => {
                handleCreateRoom(n, n.label || n.stage);
                setSelectedNode(null);
              }}
              onBossStart={(n) => {
                setSelectedBoss(n);
                setCurrentView('BATTLE');
                setSelectedNode(null);
              }}
              onBossRequest={handleBossRequest}
              myName={myIdentity.name}
            />
          )}

          {aiResult && <AIResultModal result={aiResult} onClose={() => setAIResult(null)} />}
          <div className={`toast ${showToast ? 'show' : ''} ${isErrorToast ? 'is-error' : ''}`} style={{ position: 'fixed' }}>
            {isErrorToast && (
              <button className="toast-close-btn" onClick={() => setShowToast(false)}>×</button>
            )}
            {toastMessage}
          </div>
        </React.Fragment>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>

</html>
