<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SLEG SALES DUNGEON</title>
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">

  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- PeerJS for Realtime P2P -->
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- API Configuration ---
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbzgstgq6YrlUcA0eIzHPJ5fZlLKyfvDHTjbKZcHdAjNyyxNvO05TXPnG12I9DPKGwk/exec';
    const BOSS_BG_IMAGE = 'cyber_saiyan_boss_bg_1773575562161.png';

    // --- Components ---

    // 0. Login / User Selection Screen
    const LoginScreen = ({ users, onSelect, onAddUser }) => {
      const [showAdd, setShowAdd] = useState(false);
      const [newName, setNewName] = useState('');
      const [selectedUser, setSelectedUser] = useState(null);
      const [password, setPassword] = useState('');
      const [pwError, setPwError] = useState(false);
      const [isVerifying, setIsVerifying] = useState(false);

      const handleUserClick = (u) => {
        // パスワードが設定されているユーザーはパスワード入力を要求
        if (u.hasPassword) {
          setSelectedUser(u);
          setPassword('');
          setPwError(false);
        } else {
          onSelect(u);
        }
      };

      const handlePasswordSubmit = async (e) => {
        e.preventDefault();
        setIsVerifying(true);
        setPwError(false);
        const result = await onSelect(selectedUser, password);
        if (result === false) {
          setPwError(true);
        }
        setIsVerifying(false);
      };

      // パスワード入力画面
      if (selectedUser) {
        return (
          <div className="battle-container animation-fade-in" style={{ flexDirection: 'column' }}>
            <div className="glass-container" style={{ padding: '3rem', maxWidth: '400px', width: '100%', textAlign: 'center' }}>
              <h2 className="title-cyber" style={{ color: 'var(--color-primary)', marginBottom: '0.5rem' }}>LOGIN</h2>
              <p style={{ color: '#aaa', marginBottom: '2rem', fontSize: '1rem' }}>👤 {selectedUser.name}</p>
              <form onSubmit={handlePasswordSubmit} style={{ display: 'flex', flexDirection: 'column', gap: '15px' }}>
                <input
                  type="password"
                  className="form-control"
                  placeholder="パスワードを入力"
                  value={password}
                  onChange={e => { setPassword(e.target.value); setPwError(false); }}
                  autoFocus
                  required
                  style={{ textAlign: 'center', letterSpacing: '4px', fontSize: '1.2rem', borderColor: pwError ? 'var(--color-secondary)' : undefined }}
                />
                {pwError && <p style={{ color: 'var(--color-secondary)', fontSize: '0.85rem', margin: 0 }}>❌ パスワードが違います</p>}
                <button type="submit" className="btn-primary" style={{ padding: '1rem' }} disabled={isVerifying}>
                  {isVerifying ? '確認中...' : 'ログイン ▶'}
                </button>
              </form>
              <button className="nav-btn" style={{ marginTop: '1.5rem', fontSize: '0.8rem', opacity: 0.6 }} onClick={() => { setSelectedUser(null); setPassword(''); setPwError(false); }}>
                ← 戻る
              </button>
            </div>
          </div>
        );
      }

      return (
        <div className="battle-container animation-fade-in" style={{ flexDirection: 'column' }}>
          <div className="glass-container" style={{ padding: '3rem', maxWidth: '450px', width: '100%', textAlign: 'center' }}>
            <h2 className="title-cyber" style={{ color: 'var(--color-primary)', marginBottom: '2rem' }}>WHO ARE YOU?</h2>

            {users.length > 0 ? (
              <React.Fragment>
                <p style={{ color: '#aaa', marginBottom: '2rem', fontSize: '0.9rem' }}>このデバイスを利用するユーザーを選択してください。</p>
                <div className="user-selection-list" style={{ display: 'flex', flexDirection: 'column', gap: '10px', maxHeight: '300px', overflowY: 'auto', padding: '5px' }}>
                  {users.map(u => (
                    <button key={u.id} className="nav-btn" style={{ width: '100%', padding: '1rem', textAlign: 'left', justifyContent: 'flex-start' }} onClick={() => handleUserClick(u)}>
                      {u.hasPassword ? '🔐' : '👤'} {u.name}
                    </button>
                  ))}
                </div>
                <button className="nav-btn" style={{ marginTop: '2rem', fontSize: '0.8rem', opacity: 0.6 }} onClick={() => setShowAdd(!showAdd)}>
                  {showAdd ? 'キャンセル' : '＋ 新規ユーザーを追加'}
                </button>
              </React.Fragment>
            ) : (
              <div style={{ color: '#ff4444', marginBottom: '2rem' }}>
                <p>登録されているユーザーがいません。</p>
                <p style={{ fontSize: '0.8rem' }}>最初のユーザーを作成してください。</p>
              </div>
            )}

            {(showAdd || users.length === 0) && (
              <form onSubmit={(e) => { e.preventDefault(); onAddUser(newName); setNewName(''); setShowAdd(false); }} style={{ display: 'flex', gap: '10px', marginTop: '1.5rem' }}>
                <input type="text" className="form-control" placeholder="名前を入力" value={newName} onChange={e => setNewName(e.target.value)} required />
                <button type="submit" className="btn-primary">作成</button>
              </form>
            )}
          </div>
        </div>
      );
    };

    // 1. Request Modal (Boss & Player Shared) - DELETED

    // 2. Master Admin View
    const MasterAdminPage = ({ users, stages, scenarios, onSaveUser, onAddUser, onSaveMapNode, onSaveMapNodeToDB, onSaveScenario, onDeleteScenario, onDuoChallenge, isSubmitting }) => {
      const [tab, setTab] = useState('USERS'); // 'USERS' | 'MAP' | 'SCENARIOS'
      const [editingScenarioId, setEditingScenarioId] = useState(null);
      const [editScenarioData, setEditScenarioData] = useState({});
      const [newScenario, setNewScenario] = useState({ name: '', gender: '男性', grade: '高3', deviation: 50, club: '帰宅部', personality: '明るくて素直', univ: '地方国公立 文系', worry: '' });

      // User edit state
      const [editingId, setEditingId] = useState(null);
      const [editData, setEditData] = useState({});
      const [newName, setNewName] = useState('');

      // Prompt edit state
      const [editingLevel, setEditingLevel] = useState(null);
      const [editPrompt, setEditPrompt] = useState('');

      const startEdit = (u) => { setEditingId(u.id); setEditData({ ...u }); };
      const cancelEdit = () => { setEditingId(null); setEditData({}); };
      const handleChange = (field, value) => { setEditData(prev => ({ ...prev, [field]: value })); };
      const handleSave = async () => {
        if (!editData.name) return alert('名前は必須です');
        const success = await onSaveUser(editData);
        if (success) setEditingId(null);
      };

      const levels = ['LEVEL0', 'LEVEL1', 'LEVEL2', 'LEVEL3'];

      return (
        <div className="stats-container animation-fade-in" style={{ flexDirection: 'column' }}>
          <div className="glass-container" style={{ padding: '2rem', width: '100%', boxSizing: 'border-box' }}>
            <div style={{ display: 'flex', gap: '20px', marginBottom: '2rem', borderBottom: '1px solid var(--glass-border)', paddingBottom: '1rem', overflowX: 'auto' }}>
              <button className={`nav-btn ${tab === 'USERS' ? 'active' : ''}`} onClick={() => setTab('USERS')}>👥 ユーザー</button>
              <button className={`nav-btn ${tab === 'MAP' ? 'active' : ''}`} onClick={() => setTab('MAP')}>🗺️ マップ・ボス</button>
              <button className={`nav-btn ${tab === 'SCENARIOS' ? 'active' : ''}`} onClick={() => setTab('SCENARIOS')}>🎭 シナリオ・題材</button>
            </div>

            {tab === 'USERS' && (
              <React.Fragment>
                <h2 className="title-cyber" style={{ color: 'var(--color-primary)' }}>USER MANAGEMENT</h2>
                <form onSubmit={(e) => { e.preventDefault(); onAddUser(newName); setNewName(''); }} style={{ display: 'flex', gap: '1rem', marginBottom: '1.5rem' }}>
                  <input type="text" className="form-control" placeholder="新しいメンバー名" value={newName} onChange={e => setNewName(e.target.value)} required />
                  <button type="submit" className="btn-primary" disabled={isSubmitting}>＋ 新規追加</button>
                </form>
                <table className="admin-table">
                  <thead><tr><th>名</th><th>階層</th><th>権限</th><th>メール</th><th>パスワード</th><th>操作</th></tr></thead>
                  <tbody>
                    {users.map(u => (
                      <tr key={u.id}>
                        <td style={{ fontWeight: 'bold' }}>{u.name}</td>
                        <td>{editingId === u.id ? (
                          <select className="form-control" value={editData.currentLevel} onChange={e => handleChange('currentLevel', e.target.value)}>
                            {levels.map(l => <option key={l} value={l}>{l}</option>)}
                          </select>
                        ) : u.currentLevel}</td>
                        <td>{editingId === u.id ? (
                          <select className="form-control" value={editData.role || ''} onChange={e => handleChange('role', e.target.value)}>
                            <option value="PLAYER">PLAYER</option>
                            <option value="BOSS">BOSS (評価者)</option>
                            <option value="ADMIN">ADMIN (管理者)</option>
                          </select>
                        ) : u.role || 'PLAYER'}</td>
                        <td>{editingId === u.id ? <input className="form-control" value={editData.email || ''} onChange={e => handleChange('email', e.target.value)} /> : u.email || '-'}</td>
                        <td>{editingId === u.id ? (
                          <input
                            type="password"
                            className="form-control"
                            placeholder="新パスワード（空欄=変更なし）"
                            value={editData.newPassword || ''}
                            onChange={e => handleChange('newPassword', e.target.value)}
                            style={{ minWidth: '160px' }}
                          />
                        ) : u.hasPassword ? <span style={{ color: 'var(--color-primary)', fontSize: '0.8rem' }}>🔐 設定済</span> : <span style={{ color: '#555', fontSize: '0.8rem' }}>未設定</span>}</td>
                        <td>
                          {editingId === u.id ? (
                            <div style={{ display: 'flex', gap: '5px' }}>
                              <button className="btn-primary" onClick={handleSave} disabled={isSubmitting}>保存</button>
                              <button className="nav-btn" onClick={cancelEdit} style={{ padding: '2px 10px' }}>取消</button>
                            </div>
                          ) : <button className="btn-primary" onClick={() => startEdit(u)} style={{ padding: '2px 12px' }}>編集</button>}
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </React.Fragment>
            )}

            {tab === 'MAP' && (
              <React.Fragment>
                <h2 className="title-cyber" style={{ color: 'var(--color-primary)' }}>MAP & STAGE MANAGEMENT</h2>
                
                <div style={{ display: 'flex', gap: '20px', marginBottom: '2rem' }}>
                  {levels.map(lvl => (
                    <button 
                      key={lvl} 
                      className={`nav-btn ${editData.selectedLevel === lvl ? 'active' : ''}`} 
                      onClick={() => setEditData(prev => ({ ...prev, selectedLevel: lvl, selectedStage: 'A' }))}
                      style={{ flex: 1 }}
                    >
                      {lvl}
                    </button>
                  ))}
                </div>

                {editData.selectedLevel && (
                  <div className="glass-container" style={{ padding: '1.5rem', background: 'rgba(255,255,255,0.02)' }}>
                    <div style={{ display: 'flex', gap: '15px', marginBottom: '1.5rem', borderBottom: '1px solid #333', paddingBottom: '1rem' }}>
                      {['A', 'B', 'C', 'BOSS'].map(stg => (
                        <button 
                          key={stg} 
                          className={`nav-btn ${editData.selectedStage === stg ? 'active' : ''}`}
                          onClick={() => setEditData(prev => ({ ...prev, selectedStage: stg }))}
                          style={{ fontSize: '0.8rem', padding: '5px 15px' }}
                        >
                          STAGE {stg}
                        </button>
                      ))}
                    </div>

                    {(() => {
                      const lvl = editData.selectedLevel;
                      const stg = editData.selectedStage || 'A';
                      const node = (stages || []).find(s => s.level === lvl && s.stage === stg) || { level: lvl, stage: stg, bossName: lvl, goals: '', quests: [], x: 50, y: 50 };
                      
                      return (
                        <div key={lvl + stg} style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '20px', background: 'rgba(255,255,255,0.05)', padding: '20px', borderRadius: '12px' }}>
                          <div style={{ display: 'flex', flexDirection: 'column', gap: '15px' }}>
                            <div>
                              <label style={{ fontSize: '0.8rem', color: 'var(--color-gold)', display: 'block', marginBottom: '5px' }}>表示名 / BOSS NAME</label>
                              <input className="form-control" value={node.bossName} onChange={e => onSaveMapNode(lvl, stg, { bossName: e.target.value })} />
                            </div>
                            <div>
                              <label style={{ fontSize: '0.8rem', color: 'var(--color-gold)', display: 'block', marginBottom: '5px' }}>達成目標 (MISSION GOALS)</label>
                              <textarea className="form-control" value={node.goals} onChange={e => onSaveMapNode(lvl, stg, { goals: e.target.value })} style={{ height: '80px' }} />
                            </div>
                            <div>
                              <label style={{ fontSize: '0.8rem', color: 'var(--color-gold)', display: 'block', marginBottom: '5px' }}>やるべきこと (QUESTS) | で区切り</label>
                              <textarea className="form-control" value={Array.isArray(node.quests) ? node.quests.join('|') : node.quests} onChange={e => onSaveMapNode(lvl, stg, { quests: e.target.value })} style={{ height: '80px' }} />
                            </div>
                          </div>

                          <div style={{ display: 'flex', flexDirection: 'column', gap: '15px' }}>
                            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '15px' }}>
                              <div><label style={{ fontSize: '0.8rem', color: 'var(--color-gold)', display: 'block', marginBottom: '5px' }}>座標 X %</label><input className="form-control" type="number" value={node.x} onChange={e => onSaveMapNode(lvl, stg, { x: e.target.value })} /></div>
                              <div><label style={{ fontSize: '0.8rem', color: 'var(--color-gold)', display: 'block', marginBottom: '5px' }}>座標 Y %</label><input className="form-control" type="number" value={node.y} onChange={e => onSaveMapNode(lvl, stg, { y: e.target.value })} /></div>
                            </div>
                            <div>
                              <label style={{ fontSize: '0.8rem', color: 'var(--color-gold)', display: 'block', marginBottom: '5px' }}>画像 URL (シルエット等)</label>
                              <input className="form-control" value={node.avatarUrl || ''} onChange={e => onSaveMapNode(lvl, stg, { avatarUrl: e.target.value })} placeholder="シルエット画像のURL" />
                            </div>
                            <div>
                              <label style={{ fontSize: '0.8rem', color: 'var(--color-gold)', display: 'block', marginBottom: '5px' }}>AI採点プロンプト (個別設定)</label>
                              <textarea className="form-control" value={node.prompt || ''} onChange={e => onSaveMapNode(lvl, stg, { prompt: e.target.value })} placeholder="空ならレベル既定のプロンプトを使用" style={{ height: '80px' }} />
                            </div>
                          </div>

                          <div style={{ gridColumn: 'span 2', marginTop: '10px', display: 'flex', gap: '15px' }}>
                            <button className="btn-danger" style={{ flex: 1, padding: '1rem', fontSize: '1.1rem' }} onClick={() => onSaveMapNodeToDB(node)} disabled={isSubmitting}>
                              {isSubmitting ? '保存中...' : `${lvl} ${stg} の設定をDBへ保存する`}
                            </button>
                            <button 
                              className="nav-btn" 
                              style={{ width: '180px', fontSize: '0.8rem', opacity: 0.7 }}
                              onClick={() => {
                                const defaults = {
                                  'LEVEL0': {
                                    'A': { bossName: 'スキル', goals: '具体的な基礎スキルの習得', quests: '相槌と声のトーンの調整' },
                                    'B': { bossName: '非言語', goals: '立ち振る舞い、印象の定着', quests: '目線と姿勢による圧倒' }
                                  },
                                  'LEVEL1': {
                                    'A': { bossName: 'バックトラック', goals: '相手の発言を繰り返して共感を示す', quests: 'バックトラック（反復）を3回以上実施' },
                                    'B': { bossName: '共感・賞賛', goals: '相手の感情に寄り添い、ポジティブなフィードバックを返す', quests: '共感・賞賛の言葉を3回以上盛り込む' },
                                    'C': { bossName: '要約・質問', goals: '情報を整理し、次のステップへ繋げる質問をする', quests: '要約とオープンクエスチョンを組み合わせる' }
                                  },
                                  'LEVEL2': {
                                    'A': { bossName: 'ヒアリング (SP)', goals: 'SPIN話法を完遂せよ', quests: '状況質問(S)と問題質問(P)で相手の心を開く' },
                                    'BOSS': { bossName: 'SPINマスター', goals: '完全なるSPIN話法の実施', quests: 'S・P・I・Nの各フェーズを適切に構成する' }
                                  },
                                  'LEVEL3': {
                                    'A': { bossName: 'ヒアリング (IN)', goals: '潜在ニーズを5個引き出す', quests: '深掘り質問を重ねてインサイトに辿り着く' },
                                    'BOSS': { bossName: '伝説の営業マスター', goals: '顧客の潜在的課題を特定し解決策を提示', quests: 'インサイトを突き、相手を納得させる' }
                                  }
                                };
                                const d = defaults[lvl]?.[stg];
                                if (d) {
                                  onSaveMapNode(lvl, stg, d);
                                  alert('過去の要件データを反映しました。保存ボタンを押すと確定します。');
                                } else {
                                  alert('このステージの既定データは見つかりませんでした。');
                                }
                              }}
                            >
                              📋 過去の要件を復元
                            </button>
                          </div>
                        </div>
                      );
                    })()}
                  </div>
                )}
              </React.Fragment>
            )}
            {tab === 'SCENARIOS' && (
              <React.Fragment>
                <h2 className="title-cyber" style={{ color: 'var(--color-primary)' }}>ROLEPLAY SCENARIOS</h2>

                <div className="glass-container" style={{ padding: '1rem', marginBottom: '1.5rem', background: 'rgba(255,215,0,0.05)', border: '1px solid var(--color-gold)' }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                    <div>
                      <h3 style={{ fontSize: '0.9rem', color: 'var(--color-gold)', margin: 0 }}>🧪 VIDEO & AI TEST</h3>
                      <p style={{ fontSize: '0.7rem', color: '#aaa', margin: '4px 0 0 0' }}>設定した内容でAI判定や録画保存が正しく動くかテストできます。</p>
                    </div>
                    <button className="btn-primary" onClick={() => onDuoChallenge({ name: 'TEST_USER', isTest: true })}>
                      テスト録画を開始 (TEST MODE)
                    </button>
                  </div>
                </div>
                
                <div className="glass-container" style={{ padding: '1.5rem', marginBottom: '2rem', border: '1px solid var(--color-gold)' }}>
                  <h3 style={{ margin: '0 0 1rem 0', color: 'var(--color-gold)' }}>新規シナリオ作成</h3>
                  <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: '10px', marginBottom: '10px' }}>
                    <input className="form-control" placeholder="氏名 (例: 佐藤 翔太)" value={newScenario.name} onChange={e => setNewScenario({...newScenario, name: e.target.value})} />
                    <select className="form-control" value={newScenario.gender} onChange={e => setNewScenario({...newScenario, gender: e.target.value})}>
                      <option>男性</option><option>女性</option>
                    </select>
                    <select className="form-control" value={newScenario.grade} onChange={e => setNewScenario({...newScenario, grade: e.target.value})}>
                      <option>高1</option><option>高2</option><option>高3</option><option>浪人</option>
                    </select>
                    <input className="form-control" type="number" placeholder="偏差値" value={newScenario.deviation} onChange={e => setNewScenario({...newScenario, deviation: e.target.value})} />
                  </div>
                  <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '10px', marginBottom: '10px' }}>
                    <input className="form-control" placeholder="部活 (例: サッカー部)" value={newScenario.club} onChange={e => setNewScenario({...newScenario, club: e.target.value})} />
                    <input className="form-control" placeholder="性格 (例: 明るくて素直)" value={newScenario.personality} onChange={e => setNewScenario({...newScenario, personality: e.target.value})} />
                    <input className="form-control" placeholder="志望校 (例: 地方国公立 文系)" value={newScenario.univ} onChange={e => setNewScenario({...newScenario, univ: e.target.value})} />
                  </div>
                  <textarea className="form-control" placeholder="悩み・現状 (必須)" value={newScenario.worry} onChange={e => setNewScenario({...newScenario, worry: e.target.value})} rows="3" style={{ marginBottom: '10px' }}></textarea>
                  <button className="btn-primary" onClick={async () => {
                    if (!newScenario.worry) return alert('悩み・現状は必須です');
                    await onSaveScenario(newScenario);
                    setNewScenario({ name: '', gender: '男性', grade: '高3', deviation: 50, club: '帰宅部', personality: '明るくて素直', univ: '地方国公立 文系', worry: '' });
                  }} disabled={isSubmitting}>
                    ＋ シナリオを追加
                  </button>
                </div>

                <div style={{ display: 'flex', flexDirection: 'column', gap: '15px' }}>
                  {(scenarios || []).map(s => (
                    <div key={s.id} className="glass-container" style={{ padding: '1rem', background: 'rgba(0,0,0,0.3)', position: 'relative' }}>
                      <div style={{ display: 'flex', gap: '15px', alignItems: 'center', marginBottom: '10px', paddingBottom: '10px', borderBottom: '1px solid var(--glass-border)' }}>
                        <span style={{ fontWeight: 'bold', fontSize: '1.1rem', color: 'var(--color-primary)' }}>{s.name || '名前なし'} ({s.gender || '-'})</span>
                        <span style={{ fontSize: '0.8rem', color: '#aaa', background: 'rgba(255,255,255,0.1)', padding: '2px 8px', borderRadius: '4px' }}>{s.grade || '-'} | 偏差値: {s.deviation || '-'} | {s.club || '-'}</span>
                      </div>

    // 2.7 Boss Grading View
    const BossGradingPage = ({ logs, onEvaluate }) => {

                    <span className={`slider-value ${evalData.score >= 80 ? 'max' : ''}`}>{evalData.score}</span>
                  </div>
                </div>
                <div className="form-group">
                  <label className="form-label">判定</label>
                  <select className="form-control" value={evalData.passed} onChange={e => setEvalData({ ...evalData, passed: e.target.value === 'true' })}>
                    <option value="true">合格 (LEVEL UP)</option>

                <div className="form-group">
                  <label className="form-label">ボス・コメント</label>

                <div style={{ display: 'flex', gap: '10px', marginTop: '1.5rem' }}>
                  <button type="submit" className="btn-danger" style={{ flex: 1, padding: '1rem' }} disabled={isSubmitting}>{isSubmitting ? '記録中...' : '評価を確定する 🛡️'}</button>

      return (
        <div className="stats-container animation-fade-in" style={{ flexDirection: 'column' }}>
          <div className="glass-container" style={{ padding: '2rem' }}>
            <h2 className="title-cyber" style={{ color: 'var(--color-gold)' }}>BOSS GRADING ROOM</h2>
            <p style={{ color: '#aaa', marginBottom: '2rem' }}>AI評価をクリアした挑戦者が待機しています。動画を確認し、最終判定を行ってください。</p>
            {pendingLogs.length > 0 ? (
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(300px, 1fr))', gap: '20px' }}>
                {pendingLogs.map((log, i) => (
                  <div key={i} className="boss-eval-card" onClick={() => setSelectedLog(log)} style={{ cursor: 'pointer' }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '0.5rem' }}>
                      <strong style={{ fontSize: '1.2rem' }}>{log['ユーザー名']}</strong>
                      <span className="status-badge status-passed">AI {log['AI評価点']}pt</span>
                    </div>
                    <div style={{ fontSize: '0.8rem', color: '#888', marginBottom: '1rem' }}>提出日: {log['実施日']}</div>
                    <button className="btn-primary" style={{ width: '100%' }}>動画を確認して採点する</button>

    const generatePersona = (scenarios) => {
      if (scenarios && scenarios.length > 0) {
        // スプレッドシート（DB）から取得したシナリオからランダムに1つ選択
        return scenarios[Math.floor(Math.random() * scenarios.length)];
      }

      // DBにシナリオが無い場合のフォールバック（旧ランダム生成）
      const grades = ['高1', '高2', '高3', '高3', '高3'];
      const surnames = ['佐藤', '鈴木', '高橋', '田中', '伊藤', '渡辺', '山本', '中村', '小林', '加藤', '吉田', '山田', '佐々木', '山口', '松本', '井上', '木村', '林', '斎藤'];
      const maleNames = ['大翔', '翔太', '健一', '蓮', '樹', '悠真', '陽太', '蒼空', '湊', '朝陽', '結翔', '歩夢'];
      const femaleNames = ['結衣', '陽菜', '凛', '結菜', 'ひまり', '美羽', 'さくら', '結愛', '澪', '芽依', '莉子', '葵'];
      const genders = ['男性', '女性'];
      
      const gender = genders[Math.floor(Math.random() * genders.length)];
      const name = surnames[Math.floor(Math.random() * surnames.length)] + ' ' + 
                   (gender === '男性' ? maleNames[Math.floor(Math.random() * maleNames.length)] : femaleNames[Math.floor(Math.random() * femaleNames.length)]);
      
      const deviation = Math.floor(Math.random() * 26) + 45; // 45 to 70
      
      const clubs = ['帰宅部', '帰宅部', 'サッカー部', '野球部', 'バスケ部', 'テニス部', '吹奏楽部'];
      const personalities = ['明るくて素直', '真面目で完璧主義', 'マイペースで楽観的', '人見知りで慎重', '負けず嫌いで頑固', '理屈っぽくて冷静', '承認欲求が強い', '好奇心旺盛で飽き性'];
      const univs = ['地方国公立 文系', '地方国公立 理系', '旧帝大 文系', '旧帝大 理系', '早慶上理 文系', '早慶上理 理系'];
      const worries = [
        '部活が忙しくて勉強時間が全く取れず、引退してから間に合うか不安だが、今は部活に全力を注ぎたい。',
        '親や学校からの期待が大きく、成績が少しでも下がると焦ってしまう。最近はモチベーションが落ちてきている。',
        'そろそろ受験勉強を始めないといけないと思っているが、基礎が抜けており何から手をつけていいか全くわからない。'
      ];

      return {
        id: 'FB_' + Date.now(),
        grade: grades[Math.floor(Math.random() * grades.length)],
        name,
        gender,
        deviation,
        club: clubs[Math.floor(Math.random() * clubs.length)],
        personality: personalities[Math.floor(Math.random() * personalities.length)],
        univ: univs[Math.floor(Math.random() * univs.length)],
        worry: worries[Math.floor(Math.random() * worries.length)]
      };
    };

    // 2.9 Duo Recording View (Realtime P2P)
    const DuoRecordingView = ({ userFullName, targetName, mode, scenarios, onComplete, onCancel }) => {
      const [status, setStatus] = useState('initializing');
      const [recording, setRecording] = useState(false);
      const [timer, setTimer] = useState(0);
      const [blob, setBlob] = useState(null);
      const [uploading, setUploading] = useState(false);
      const [countdown, setCountdown] = useState(null);

      // Automatic Role Assignment based on mode
      const role = mode === 'HOST' ? 'ROLEPLAYER' : 'PARTNER';
      const [persona, setPersona] = useState(() => mode === 'HOST' ? generatePersona(scenarios) : null);
      const localVideoRef = useRef(null);
      const remoteVideoRef = useRef(null);
      const canvasRef = useRef(document.createElement('canvas'));
      const peerRef = useRef(null);
      const mediaRecorderRef = useRef(null);
      const chunksRef = useRef([]);
      const streamRef = useRef(null);
      const animationRef = useRef(null);

      useEffect(() => {
        initPeer();
        return () => {
          if (peerRef.current) peerRef.current.destroy();
          if (animationRef.current) cancelAnimationFrame(animationRef.current);
          // ロープレ終了時にカメラ・マイクを必ず停止
          if (streamRef.current) {
            streamRef.current.getTracks().forEach(t => t.stop());
            streamRef.current = null;
          }
        };
      }, []);

      const initPeer = async () => {
        try {
          // ロープレ開始時にカメラ・マイクを取得（高画質・高音質設定）
          const stream = await navigator.mediaDevices.getUserMedia({
            video: { width: { ideal: 1280 }, height: { ideal: 720 }, frameRate: { ideal: 30 } },
            audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true, sampleRate: 48000 }
          });
          streamRef.current = stream;

          const sanitize = (n) => encodeURIComponent(n || 'guest').replace(/[^a-zA-Z0-9]/g, '').toLowerCase() + 'sleg26';
          const hostId = mode === 'HOST' ? sanitize(userFullName) : undefined;
          
          const peer = new Peer(hostId, {
            config: {
              iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' }
              ]
            },
            debug: 2
          });
          peerRef.current = peer;

          peer.on('error', (err) => {
            if (err.type === 'unavailable-id') {
              console.warn("PeerJS Error: ID already in use. Retrying with random ID or continuing locally...");
              setStatus('connected'); // Fallback if local testing
            } else {
              console.warn("PeerJS Error:", err);
            }
          });

          peer.on('open', async (id) => {
            if (mode === 'TEST') {
              setStatus('connected');
              return;
            }
            if (mode === 'HOST') {
              setStatus('waiting');
              
              // Send persona to partner when they connect data channel
              peer.on('connection', (conn) => {
                conn.on('open', () => {
                  conn.send({ type: 'SYNC_PERSONA', payload: persona });
                });
              });

              peer.on('call', (call) => {
                call.answer(stream);
                call.on('stream', (remoteStream) => {
                  if (remoteVideoRef.current) remoteVideoRef.current.srcObject = remoteStream;
                  setStatus('connected');
                });
              });
            } else {
              const targetPeerId = sanitize(targetName);
              
              const conn = peer.connect(targetPeerId);
              conn.on('data', (data) => {
                if (data.type === 'SYNC_PERSONA') setPersona(data.payload);
              });

              const call = peer.call(targetPeerId, stream);
              if (call) {
                call.on('stream', (remoteStream) => {
                  if (remoteVideoRef.current) remoteVideoRef.current.srcObject = remoteStream;
                  setStatus('connected');
                });
              } else {
                alert("相手が見つかりませんでした。通信IDを確認してください。");
                onCancel();
              }
            }
          });
        } catch (e) { alert("メディアエラー: " + e.message); onCancel(); }
      };

      // Assign stream when role is selected and video elements render
      useEffect(() => {
        if (role && streamRef.current && localVideoRef.current) {
          localVideoRef.current.srcObject = streamRef.current;
        }
      }, [role]);

      const startDuoRecording = () => {
        const canvas = canvasRef.current;
        canvas.width = 1280;
        canvas.height = 720;
        const ctx = canvas.getContext('2d');

        const draw = () => {
          // Side by side layout
          if (localVideoRef.current) {
            // Mirror inversion for local video
            ctx.save();
            ctx.translate(640, 0);
            ctx.scale(-1, 1);
            ctx.drawImage(localVideoRef.current, 0, 0, 640, 720);
            ctx.restore();
          }
          if (remoteVideoRef.current && remoteVideoRef.current.srcObject) {
            ctx.drawImage(remoteVideoRef.current, 640, 0, 640, 720);
          }
          animationRef.current = requestAnimationFrame(draw);
        };
        draw();

        const canvasStream = canvas.captureStream(30);
        // Merge audio
        const audioCtx = new AudioContext();
        const dest = audioCtx.createMediaStreamDestination();
        const localSource = audioCtx.createMediaStreamSource(streamRef.current);
        localSource.connect(dest);

        if (remoteVideoRef.current && remoteVideoRef.current.srcObject) {
          const remoteSource = audioCtx.createMediaStreamSource(remoteVideoRef.current.srcObject);
          remoteSource.connect(dest);
        }

        const outputStream = new MediaStream([
          canvasStream.getVideoTracks()[0],
          dest.stream.getAudioTracks()[0]
        ]);

        // 直接アップロード方式のため、高画質ビットレート（2.5Mbps）と高品質音声に引き上げ
        try {
          mediaRecorderRef.current = new MediaRecorder(outputStream, {
            mimeType: 'video/webm;codecs=vp8',
            videoBitsPerSecond: 2500000
          });
        } catch (e) {
          mediaRecorderRef.current = new MediaRecorder(outputStream, { mimeType: 'video/webm' });
        }

        mediaRecorderRef.current.ondataavailable = (e) => chunksRef.current.push(e.data);
        mediaRecorderRef.current.onstop = () => {
          const videoBlob = new Blob(chunksRef.current, { type: 'video/webm' });
          setBlob(videoBlob);
          cancelAnimationFrame(animationRef.current);
          
          // Auto-upload and evaluate
          setUploading(true);
          onComplete({
            videoBlob: videoBlob,
            contentType: videoBlob.type || 'video/webm',
            isDuo: true,
            isTest: mode === 'TEST',
            role: role
          }).catch(err => {
            console.error("Upload error:", err);
            setUploading(false);
          });
        };

        chunksRef.current = [];
        mediaRecorderRef.current.start();
        setRecording(true);
        setTimer(0);
        const interval = setInterval(() => setTimer(t => t + 1), 1000);
        mediaRecorderRef.current._interval = interval;
      };

      const stopDuoRecording = () => {
        setRecording(false); // UI update FIRST for "patt" feel
        clearInterval(mediaRecorderRef.current._interval);
        mediaRecorderRef.current.stop();
      };

      const handleStartClick = () => {
        setCountdown(3);
        let count = 3;
        const tick = setInterval(() => {
          count--;
          if (count > 0) {
            setCountdown(count);
          } else {
            clearInterval(tick);
            setCountdown(null);
            startDuoRecording();
          }
        }, 1000);
      };


      return (
        <div className="battle-container animation-fade-in" style={{ display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          <div className="glass-container" style={{ padding: '2rem', maxWidth: '900px', width: '100%', textAlign: 'center', margin: 'auto' }}>
            <h2 className="title-cyber" style={{ color: 'var(--color-primary)' }}>
              {role === 'ROLEPLAYER' ? '⚔️ TRAINING' : '🤝 SUPPORTING'}: {mode === 'HOST' ? '待機中' : `VS ${targetName}`}
            </h2>
            {persona && (
              <div className="animation-slide-up" style={{ marginBottom: '1.5rem', background: 'rgba(0, 15, 5, 0.8)', padding: '15px', borderRadius: '12px', border: '1px solid var(--color-primary)', textAlign: 'left' }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '10px', borderBottom: '1px solid rgba(0,255,153,0.3)', paddingBottom: '10px' }}>
                  <span style={{ color: 'var(--color-primary)', fontWeight: 'bold', fontSize: '1.1rem', textShadow: '0 0 10px var(--color-primary)' }}>👤 本日のターゲット顧客</span>
                </div>
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: '10px', fontSize: '0.85rem' }}>
                  <div className="glass-container" style={{ padding: '8px', background: 'rgba(255,255,255,0.05)' }}>
                    <span style={{ color: '#aaa', fontSize: '0.7rem', display: 'block' }}>名前・性別</span>
                    <strong>{persona.name} ({persona.gender})</strong>
                  </div>
                  <div className="glass-container" style={{ padding: '8px', background: 'rgba(255,255,255,0.05)' }}>
                    <span style={{ color: '#aaa', fontSize: '0.7rem', display: 'block' }}>学年・偏差値</span>
                    <strong>{persona.grade} (偏差値: {persona.deviation})</strong>
                  </div>
                  <div className="glass-container" style={{ padding: '8px', background: 'rgba(255,255,255,0.05)' }}>
                    <span style={{ color: '#aaa', fontSize: '0.7rem', display: 'block' }}>部活</span>
                    <strong>{persona.club}</strong>
                  </div>
                  <div className="glass-container" style={{ padding: '8px', background: 'rgba(255,255,255,0.05)' }}>
                    <span style={{ color: '#aaa', fontSize: '0.7rem', display: 'block' }}>性格</span>
                    <strong>{persona.personality}</strong>
                  </div>
                </div>
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 2fr', gap: '10px', marginTop: '10px', fontSize: '0.85rem' }}>
                  <div className="glass-container" style={{ padding: '8px', background: 'rgba(255,255,255,0.05)' }}>
                    <span style={{ color: '#aaa', fontSize: '0.7rem', display: 'block' }}>志望校</span>
                    <strong>{persona.univ}</strong>
                  </div>
                  <div className="glass-container" style={{ padding: '8px', background: 'rgba(255,255,255,0.05)' }}>
                    <span style={{ color: '#aaa', fontSize: '0.7rem', display: 'block' }}>悩み・現状</span>
                    <strong style={{ color: 'var(--color-secondary)' }}>{persona.worry}</strong>
                  </div>
                </div>
              </div>
            )}
            <div style={{ display: 'flex', gap: '10px', height: '340px', marginTop: '1rem', position: 'relative' }}>
              {countdown !== null && (
                <div style={{ position: 'absolute', top: 0, left: 0, right: 0, bottom: 0, background: 'rgba(0,0,0,0.6)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 10, borderRadius: '10px' }}>
                  <span style={{ fontSize: '10rem', color: 'var(--color-primary)', textShadow: '0 0 30px var(--color-primary)', fontWeight: 'bold', animation: 'pulse 1s infinite' }}>{countdown}</span>
                </div>
              )}
              <div style={{ flex: 1, background: '#000', borderRadius: '10px', overflow: 'hidden', position: 'relative', border: '2px solid var(--color-primary)' }}>
                <video ref={localVideoRef} autoPlay muted playsInline className="video-mirror" style={{ width: '100%', height: '100%', objectFit: 'cover' }} />
                <div style={{ position: 'absolute', bottom: 10, left: 10, fontSize: '0.8rem', color: 'white', background: 'rgba(0,0,0,0.5)', padding: '2px 8px', borderRadius: '4px' }}>YOU ({role})</div>
              </div>
              <div style={{ flex: 1, background: '#000', borderRadius: '10px', overflow: 'hidden', position: 'relative', border: '2px solid var(--color-secondary)' }}>
                <video ref={remoteVideoRef} autoPlay playsInline style={{ width: '100%', height: '100%', objectFit: 'cover' }} />
                <div style={{ position: 'absolute', bottom: 10, left: 10, fontSize: '0.8rem', color: 'white', background: 'rgba(0,0,0,0.5)', padding: '2px 8px', borderRadius: '4px' }}>PARTNER</div>
              </div>
            </div>

            {status === 'waiting' && <div className="loader-pulse" style={{ marginTop: '1rem' }}>パートナーの参加を待っています...</div>}

            <div style={{ marginTop: '2rem', display: 'flex', gap: '20px', justifyContent: 'center', alignItems: 'center' }}>
              {(status === 'connected' || mode === 'TEST') && !blob && mode === 'HOST' && (
                !recording ? (
                  <button className="btn-record-start" onClick={handleStartClick} disabled={countdown !== null}> REC START ◉</button>
                ) : (
                  <button className="btn-record-stop" onClick={stopDuoRecording}>STOP ▢ ({Math.floor(timer / 60)}:{String(timer % 60).padStart(2, '0')})</button>
                )
              )}
              {uploading && (
                <button className="btn-primary" disabled style={{ background: 'var(--color-primary)', color: 'black' }}>
                  AI評価へ送信中...
                </button>
              )}
              <button className="nav-btn" onClick={onCancel}>終了</button>
            </div>
          </div>
        </div>
      );
    };

    // 3.1 Stage Detail Modal (Refined)
    const StageDetailModal = ({ node, logs, myName, onClose, onDuoStart, onBossStart }) => {
      const getStars = (l, s) => {
        const stageLogs = logs.filter(log => {
          if (log['ユーザー名'] !== myName || log['合否'] !== '合格') return false;
          if (log['階層'] !== l) return false;
          try {
            const detail = JSON.parse(log['詳細JSON'] || '{}');
            return detail.stage === s && (log['AI評価点'] >= 80 || (detail.R_phase_evaluation?.total_score >= 80));
          } catch (e) { return false; }
        });
        return Math.min(3, stageLogs.length);
      };

      const stars = getStars(node.level, node.stage);
      const isBoss = node.stage === 'BOSS';

      return (
        <div className="modal-overlay animation-fade-in">
          <div className="glass-container animation-slide-up" style={{ padding: '2.5rem', maxWidth: '500px', width: '90%', textAlign: 'center', border: '1px solid var(--color-primary)' }}>
            <div style={{ marginBottom: '2rem' }}>
              <span className="status-badge" style={{ background: 'var(--color-primary)', fontSize: '0.9rem', padding: '5px 15px', borderRadius: '50px' }}>
                {node.level} - STAGE {node.stage}
              </span>
              <h2 className="title-cyber" style={{ fontSize: '2rem', margin: '1rem 0', color: 'white' }}>{node.bossName}</h2>
              <div className="stars-display" style={{ fontSize: '2rem', letterSpacing: '10px' }}>
                {[1, 2, 3].map(s => (
                  <span key={s} style={{ color: stars >= s ? 'var(--color-gold)' : 'rgba(255,255,255,0.1)' }}>★</span>
                ))}
              </div>
            </div>

            <div style={{ background: 'rgba(255,255,255,0.05)', padding: '1.5rem', borderRadius: '15px', textAlign: 'left', marginBottom: '2rem', border: '1px solid rgba(255,255,255,0.1)' }}>
              <div style={{ marginBottom: '1.2rem' }}>
                <strong style={{ color: 'var(--color-gold)', display: 'block', fontSize: '0.8rem', marginBottom: '5px', textTransform: 'uppercase' }}>Mission Goal</strong>
                <p style={{ margin: 0, fontSize: '1.1rem', lineHeight: '1.5', fontWeight: 'bold' }}>{node.goals || '目標が設定されていません。'}</p>
              </div>
              <div>
                <strong style={{ color: 'var(--color-gold)', display: 'block', fontSize: '0.8rem', marginBottom: '8px', textTransform: 'uppercase' }}>Quests</strong>
                <ul className="quest-list" style={{ margin: 0, paddingLeft: '0', listStyle: 'none', fontSize: '0.95rem', color: '#eee' }}>
                  {(Array.isArray(node.quests) ? node.quests : (node.quests || '').split('|')).map((q, i) => (
                    <li key={i} style={{ marginBottom: '8px', paddingLeft: '20px', position: 'relative' }}>
                      <span style={{ position: 'absolute', left: 0, color: 'var(--color-primary)' }}>▹</span> {q}
                    </li>
                  ))}
                </ul>
              </div>
            </div>

            <div style={{ display: 'flex', flexDirection: 'column', gap: '15px' }}>
              {isBoss ? (
                <button 
                  className="btn-danger animation-pulse" 
                  style={{ padding: '1.2rem', fontSize: '1.2rem', fontWeight: 'bold', borderRadius: '12px' }}
                  onClick={() => onBossStart(node)}
                >
                  👿 ボス戦の申し込みを飛ばす
                </button>
              ) : (
                <button 
                  className="btn-primary" 
                  style={{ padding: '1.2rem', fontSize: '1.2rem', fontWeight: 'bold', borderRadius: '12px' }}
                  onClick={() => onDuoStart(node)}
                >
                  ⚔️ ロープレ修行を開始する
                </button>
              )}
              <button className="nav-btn" style={{ padding: '1rem', opacity: 0.6 }} onClick={onClose}>マップに戻る</button>
            </div>
            
            {!isBoss && stars < 3 && (
              <p style={{ marginTop: '1.5rem', fontSize: '0.8rem', color: '#888' }}>
                あと {3 - stars} 回「80点以上で合格」すると★が貯まり、次へ進めます。
              </p>
            )}
          </div>
        </div>
      );
    };

    // 3. Dungeon Map
    const RecruitmentBoard = ({ rooms, users, myName, onJoin, onCancel }) => {
      return (
        <div className="glass-container animation-fade-in" style={{ padding: '15px', marginBottom: '20px', border: '1px solid rgba(0,255,153,0.3)', background: 'rgba(0,10,5,0.6)' }}>
          <h3 style={{ margin: '0 0 10px 0', fontSize: '0.9rem', color: 'var(--color-primary)', display: 'flex', alignItems: 'center', gap: '8px' }}>
            <span className="pulse-dot"></span> ⚔️ ロープレ募集掲示板（ロビー）
          </h3>
          {rooms.length === 0 ? (
            <div style={{ fontSize: '0.8rem', color: '#666', fontStyle: 'italic', textAlign: 'center', padding: '10px' }}>
              現在募集中のルームはありません。マップからステージを選んで募集を出してみましょう！
            </div>
          ) : (
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(280px, 1fr))', gap: '10px' }}>
              {rooms.map((room, idx) => {
                const host = users.find(u => u.name === room.hostName);
                const isMine = room.hostName === myName;
                return (
                  <div key={idx} className="glass-container hover-glow" style={{ padding: '10px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', background: 'rgba(255,255,255,0.03)', border: isMine ? '1px solid var(--color-primary)' : '1px solid #333' }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
                      <div className="avatar-small" style={{ backgroundImage: host?.avatarUrl ? `url(${host.avatarUrl})` : 'none', width: '32px', height: '32px' }}>
                        {!host?.avatarUrl && room.hostName.charAt(0)}
                      </div>
                      <div>
                        <div style={{ fontSize: '0.85rem', fontWeight: 'bold' }}>{room.hostName}</div>
                        <div style={{ fontSize: '0.7rem', color: 'var(--color-primary)' }}>{room.level} - ステージ{room.stage}</div>
                      </div>
                    </div>
                    {isMine ? (
                      <button className="btn-danger" style={{ padding: '5px 12px', fontSize: '0.75rem' }} onClick={onCancel}>募集を解除</button>
                    ) : (
                      <button className="btn-primary" style={{ padding: '5px 12px', fontSize: '0.75rem' }} onClick={() => onJoin(room)}>参戦する</button>
                    )}
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    };

    // 3.2 Dungeon Map (Individual Node Rendering)
    const DungeonMap = ({ users, logs, mapNodes, recruitmentRooms, myName, onBossClick, onStageSelect, onJoinRoom, onCancelRoom, onNodeSelect, currentLevel }) => {
      const getStars = (l, s) => {
        const stageLogs = logs.filter(log => {
          if (log['ユーザー名'] !== myName || log['合否'] !== '合格') return false;
          if (log['階層'] !== l) return false;
          try {
            const detail = JSON.parse(log['詳細JSON'] || '{}');
            return detail.stage === s && (log['AI評価点'] >= 80 || (detail.R_phase_evaluation?.total_score >= 80));
          } catch (e) { return false; }
        });
        return Math.min(3, stageLogs.length);
      };

      const getAssetUrl = (level, stage) => {
        if (stage === 'BOSS') {
          if (level === 'LEVEL3') return 'icon_boss.png';
          if (level === 'LEVEL2') return 'icon_castle.png';
          if (level === 'LEVEL1') return 'icon_fortress.png';
          return 'icon_fortress.png';
        }
        if (level === 'LEVEL3') return 'icon_castle.png';
        if (level === 'LEVEL2') return 'icon_fortress.png';
        if (level === 'LEVEL1') return 'icon_village.png';
        return 'icon_camp.png';
      };

      const usersByLevel = {};
      users.forEach(u => {
        const lvl = (u.currentLevel || 'LEVEL0').toUpperCase();
        if (!usersByLevel[lvl]) usersByLevel[lvl] = [];
        usersByLevel[lvl].push(u);
      });

      return (
        <div className="dungeon-map-container" style={{ display: 'flex', flexDirection: 'column', width: '100%', height: '100%', background: '#050505', overflowY: 'auto', padding: '20px' }}>
          
          <RecruitmentBoard rooms={recruitmentRooms} users={users} myName={myName} onJoin={onJoinRoom} onCancel={onCancelRoom} />

          <div className="map-canvas-wrapper" style={{ 
            position: 'relative', 
            width: '100%', 
            minHeight: '1200px', 
            background: 'url(bg-mountain.png) no-repeat center center / cover',
            borderRadius: '30px', 
            border: '2px solid #222',
            boxShadow: '0 0 40px rgba(0,0,0,0.8) inset',
            padding: '40px'
          }}>
            {/* Background Grid */}
            <div style={{ position: 'absolute', inset: 0, opacity: 0.05, backgroundImage: 'linear-gradient(#4facfe 1px, transparent 1px), linear-gradient(90deg, #4facfe 1px, transparent 1px)', backgroundSize: '60px 60px' }}></div>

            <div className="map-inner" style={{ position: 'relative', width: '100%', height: '100%' }}>
              <style>{`
                .map-node-wrapper:hover {
                  z-index: 100 !important;
                }
                .users-hover-container {
                  position: absolute;
                  top: calc(100% + 56px);
                  left: 50%;
                  transform: translateX(-50%);
                  z-index: 30;
                  display: flex;
                  flex-direction: column;
                  align-items: center;
                }
                .users-hover-badge {
                  background: rgba(0,255,153,0.15);
                  padding: 4px 14px;
                  border: 1px solid var(--color-primary);
                  border-radius: 20px;
                  font-size: 0.8rem;
                  color: var(--color-primary);
                  white-space: nowrap;
                  box-shadow: 0 0 10px rgba(0,255,153,0.3);
                  font-weight: bold;
                  cursor: default;
                  display: flex;
                  align-items: center;
                  gap: 5px;
                  transition: all 0.2s;
                  position: relative;
                  z-index: 2;
                }
                .users-hover-badge:hover,
                .users-hover-container:hover .users-hover-badge {
                  background: var(--color-primary);
                  color: black;
                }
                .users-hover-list {
                  position: absolute;
                  bottom: calc(100% + 8px);
                  left: 50%;
                  transform: translateX(-50%);
                  max-height: 0;
                  opacity: 0;
                  overflow: hidden;
                  transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
                  display: flex;
                  flex-direction: column;
                  gap: 4px;
                  align-items: center;
                  width: max-content;
                  min-width: 100px;
                  transform-origin: bottom center;
                  pointer-events: none;
                  z-index: 1;
                }
                .users-hover-container:hover .users-hover-list {
                  max-height: 350px;
                  opacity: 1;
                  overflow-y: auto;
                  pointer-events: auto;
                  padding-bottom: 5px;
                }
              `}</style>
              {mapNodes.map((node, idx) => {
                const stars = getStars(node.level, node.stage);
                
                // Progression Logic
                let isUnlocked = true;
                const levelInt = parseInt(node.level?.replace('LEVEL', '') || '0');
                const userLevelInt = parseInt(currentLevel?.replace('LEVEL', '') || '0');
                
                // 1. Current user level check
                if (levelInt > userLevelInt) isUnlocked = false;
                
                // 2. Intra-level locking
                if (isUnlocked) {
                  if (node.stage === 'B') isUnlocked = getStars(node.level, 'A') >= 3;
                  if (node.stage === 'C') isUnlocked = getStars(node.level, 'B') >= 3;
                  if (node.stage === 'BOSS') isUnlocked = getStars(node.level, 'C') >= 3;
                }

                // Layout: Bottom up zigzag path
                let finalX = node.x;
                let finalY = node.y;
                
                const pathCoords = {
                  'LEVEL0_A': { x: 25, y: 88 },
                  'LEVEL0_B': { x: 50, y: 78 },
                  'LEVEL1_A': { x: 75, y: 65 },
                  'LEVEL1_B': { x: 60, y: 52 },
                  'LEVEL1_C': { x: 35, y: 42 },
                  'LEVEL2_A': { x: 25, y: 30 },
                  'LEVEL2_BOSS': { x: 50, y: 22 },
                  'LEVEL3_A': { x: 75, y: 12 },
                  'LEVEL3_BOSS': { x: 50, y: 4 }
                };
                
                const key = `${node.level}_${node.stage}`;
                if (pathCoords[key]) {
                  finalX = pathCoords[key].x;
                  finalY = pathCoords[key].y;
                } else if (node.x === 50 && node.y === 50) {
                  finalY = 90 - (levelInt * 15);
                  const stageMap = { 'A': 15, 'B': 35, 'C': 55, 'BOSS': 80 };
                  finalX = stageMap[node.stage] || 10;
                }

                const levelUsers = usersByLevel[node.level]?.filter(u => {
                  // If it's the current user, only show them on the node they are at or the latest available node?
                  // For simplicity, we'll just show all users of that level at the "BOSS" or "A" node of that level.
                  return node.stage === 'A'; // Show avatars only at the start of the level for now
                }) || [];

                return (
                  <div key={idx} className={`map-node-wrapper ${isUnlocked ? 'active' : 'locked'}`} style={{ 
                    position: 'absolute', 
                    left: `${finalX}%`, 
                    top: `${finalY}%`, 
                    transform: 'translate(-50%, -50%)',
                    zIndex: isUnlocked ? 10 : 1
                  }}>
                    <div 
                      className={`map-node ${node.stage === 'BOSS' ? 'is-boss-node' : ''}`} 
                      onClick={() => isUnlocked && onNodeSelect(node)}
                      style={{ 
                        width: node.stage === 'BOSS' ? '160px' : '120px',
                        height: node.stage === 'BOSS' ? '160px' : '120px',
                        cursor: isUnlocked ? 'pointer' : 'not-allowed',
                        opacity: isUnlocked ? 1 : 0.4,
                        filter: isUnlocked ? 'drop-shadow(0 0 10px rgba(0,255,153,0.4))' : 'grayscale(100%)',
                        display: 'flex',
                        flexDirection: 'column',
                        alignItems: 'center',
                        justifyContent: 'center',
                        transition: 'all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)'
                      }}
                    >
                      <div className="node-icon-bg" style={{ 
                        width: '100%', height: '100%',
                        display: 'flex', alignItems: 'center', justifyContent: 'center',
                        fontSize: node.stage === 'BOSS' ? '5rem' : '4rem',
                        textShadow: isUnlocked ? '0 10px 20px rgba(0,0,0,0.8), 0 0 20px rgba(0,255,153,0.8)' : '0 10px 20px rgba(0,0,0,0.8)',
                        position: 'relative'
                      }}>
                        {node.avatarUrl && isUnlocked ? (
                          <img src={node.avatarUrl} style={{ width: '80%', height: '80%', objectFit: 'cover', borderRadius: '50%', border: '3px solid var(--color-primary)' }} />
                        ) : (
                          isUnlocked ? (
                            <img 
                              src={getAssetUrl(node.level, node.stage)} 
                              style={{ 
                                width: '100%', 
                                height: '100%', 
                                objectFit: 'cover', 
                                borderRadius: '50%', 
                                border: node.stage === 'BOSS' ? '3px solid var(--color-gold)' : '2px solid var(--color-primary)',
                                boxShadow: node.stage === 'BOSS' ? '0 0 25px var(--color-gold)' : '0 0 15px var(--color-primary)',
                              }} 
                              alt="stage-icon"
                            />
                          ) : (
                            <span style={{ transform: 'translateY(-10px)' }}>🔒</span>
                          )
                        )}
                        {stars >= 3 && <div className="clear-check" style={{ top: 0, right: 0, transform: 'scale(1.5)', background: 'var(--color-primary)', borderRadius: '50%', padding: '2px 8px' }}>✓</div>}
                      </div>
                    </div>

                    <div className="node-stars" style={{ position: 'absolute', top: '100%', left: '50%', transform: 'translateX(-50%)', marginTop: '4px', display: 'flex', gap: '3px', zIndex: 15 }}>
                      {[1, 2, 3].map(s => (
                        <span key={s} style={{ color: stars >= s ? 'var(--color-gold)' : 'rgba(255,255,255,0.1)', fontSize: '14px', textShadow: '0 0 5px black' }}>★</span>
                      ))}
                    </div>

                    <div className="node-title hover-glow" style={{ position: 'absolute', top: 'calc(100% + 22px)', left: '50%', transform: 'translateX(-50%)', marginTop: '2px', fontSize: '0.85rem', fontWeight: '900', color: isUnlocked ? 'white' : '#888', textAlign: 'center', whiteSpace: 'nowrap', background: 'rgba(0,10,5,0.85)', border: '1px solid var(--glass-border)', padding: '4px 12px', borderRadius: '6px', boxShadow: '0 2px 8px rgba(0,0,0,0.8)', zIndex: 15 }}>
                      {node.bossName || '???'}
                    </div>

                    {/* Show level indicator for the first node of each level */}
                    {node.stage === 'A' && (
                      <div style={{ position: 'absolute', top: '-55px', left: '50%', transform: 'translateX(-50%)', color: '#ffea00', fontSize: '1.3rem', fontWeight: '900', letterSpacing: '4px', whiteSpace: 'nowrap', background: 'rgba(0,10,0,0.85)', padding: '6px 20px', borderRadius: '12px', border: '2px solid rgba(255,234,0,0.8)', boxShadow: '0 6px 15px rgba(0,0,0,0.9), 0 0 15px rgba(255,234,0,0.6)', zIndex: 20 }}>
                        {node.level}
                      </div>
                    )}

                    {/* Users at this level - Hover Nameplates */}
                    {levelUsers.length > 0 && (
                      <div className="users-hover-container">
                        <div className="users-hover-badge">
                          👥 {levelUsers.length}名
                        </div>
                        <div className="users-hover-list">
                          {levelUsers.map(u => (
                            <div key={u.id} className="hover-glow" style={{ background: 'rgba(0,20,10,0.95)', padding: '5px 12px', border: '1px solid rgba(0,255,153,0.5)', borderRadius: '4px', fontSize: '0.8rem', color: 'white', whiteSpace: 'nowrap', width: '100%', textAlign: 'center', boxShadow: '0 4px 6px rgba(0,0,0,0.5)', fontWeight: 'bold' }}>
                              {u.name}
                            </div>
                          ))}
                        </div>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );
    };

    // ... (StatsPage and BattleScreen remain similar to previous but simplified for brevity in this step)
    const StatsPage = ({ logs, users, myName, onSelectLog }) => {
      const chartRef = useRef(null);
      const user = users.find(u => u.name === myName);

      useEffect(() => {
        const ctx = document.getElementById('radarChart');
        if (!ctx) return;
        if (chartRef.current) chartRef.current.destroy();

        // Skill calculation logic (Relation, Empathy, Hearing, Presentation, Closing)
        const myLogs = logs.filter(l => l['ユーザー名'] === myName);

        const getAvg = (level, extractor) => {
          const levelLogs = myLogs.filter(l => (l['現在の階層'] === level || l['階層'] === level));
          if (levelLogs.length === 0) return 0;
          const scores = levelLogs.map(l => {
            try {
              const parsed = l['詳細JSON'] ? JSON.parse(l['詳細JSON']) : {};
              return extractor(l, parsed);
            } catch (e) { return 0; }
          });
          const avg = scores.reduce((a, b) => a + b, 0) / scores.length;
          return (avg / 100) * 5; // Scale 0-100 to 0-5
        };

        const skills = [
          getAvg('LEVEL0', (l, p) => p.R_phase_evaluation?.total_score || 0), // 関係構築
          getAvg('LEVEL0', (l, p) => p.R_phase_evaluation?.S2_score || 0),    // 共感賞賛 (S2:共感賞賛)
          getAvg('LEVEL1', (l, p) => l['AI評価点'] || 0),                      // ヒアリング
          getAvg('LEVEL2', (l, p) => l['AI評価点'] || 0),                      // プレゼン
          getAvg('LEVEL3', (l, p) => l['AI評価点'] || 0)                       // クロージング
        ].map(s => s || 1); // 0だと寂しいので最低1、データあれば反映

        chartRef.current = new Chart(ctx, {
          type: 'radar',
          data: {
            labels: ['関係構築', '共感賞賛', 'ヒアリング', 'プレゼン', 'クロージング'],
            datasets: [{ label: 'My Skills', data: skills, backgroundColor: 'rgba(0, 255, 204, 0.2)', borderColor: '#00ffcc', borderWidth: 2 }]
          },
          options: { scales: { r: { grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { display: false, max: 5, min: 0 } } }, plugins: { legend: { display: false } } }
        });
      }, [logs, myName]);

      // 最新から並べるためにリバース
      const myLogs = [...logs].filter(l => l['ユーザー名'] === myName).reverse();

      // 最近5回のロープレ結果からフィードバックを抽出
      const recentFeedbacks = myLogs
        .filter(log => log['詳細JSON'])
        .slice(0, 5)
        .map(log => {
          try {
            const parsed = JSON.parse(log['詳細JSON']);
            return {
              date: log['実施日'],
              partner: log['相手'],
              isPassed: log['合否'] === '合格',
              score: log['AI評価点'] !== undefined ? log['AI評価点'] : (parsed.R_phase_evaluation?.total_score || 0),
              summary: parsed.summary || '評価コメントがありません',
              bottleneck: parsed.bottleneck || '特にクリティカルな課題は見つかりませんでした'
            };
          } catch (e) { return null; }
        })
        .filter(Boolean);

      return (
        <div className="stats-container animation-fade-in" style={{ display: 'flex', flexDirection: 'column', gap: '20px' }}>

          {/* 上部: レーダーチャート & 最近の課題 */}
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '20px' }}>
            <div className="radar-section glass-container" style={{ textAlign: 'center', padding: '20px' }}>
              <h2 className="title-cyber" style={{ color: 'var(--color-primary)' }}>SKILL RADAR</h2>
              <canvas id="radarChart" style={{ maxWidth: '300px', margin: '20px auto' }}></canvas>
            </div>

            <div className="glass-container" style={{ padding: '20px', overflowY: 'auto', display: 'flex', flexDirection: 'column', maxHeight: '350px' }}>
              <h2 className="title-cyber" style={{ color: 'var(--color-secondary)', marginBottom: '1rem', borderBottom: '1px solid rgba(255,255,255,0.1)', paddingBottom: '0.5rem', fontSize: '1.2rem' }}>RECENT FEEDBACKS</h2>
              {recentFeedbacks.length > 0 ? (
                <div style={{ display: 'flex', flexDirection: 'column', gap: '10px' }}>
                  {recentFeedbacks.map((item, idx) => {
                    const isGood = item.isPassed;
                    const bgColor = isGood ? 'rgba(0, 153, 255, 0.1)' : 'rgba(255, 0, 85, 0.05)';
                    const borderColor = isGood ? '#0099ff' : 'var(--color-secondary)';
                    const labelColor = isGood ? '#99ccff' : '#ffb3c6';

                    return (
                      <div key={idx} style={{ background: bgColor, borderLeft: `4px solid ${borderColor}`, padding: '10px 14px', borderRadius: '0 8px 8px 0', transition: 'all 0.2s' }} className="issue-card hover-glow">
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '6px' }}>
                          <div style={{ fontSize: '0.75rem', color: labelColor, fontWeight: 'bold', letterSpacing: '0.5px' }}>{item.date} VS {item.partner}</div>
                          <div style={{ fontSize: '0.85rem', fontWeight: '900', color: isGood ? '#00ccff' : 'var(--color-secondary)' }}>{item.score}pt</div>
                        </div>
                        <div style={{ fontSize: '0.85rem', lineHeight: '1.5', color: '#eaeaea', overflow: 'hidden', textOverflow: 'ellipsis', display: '-webkit-box', WebkitLineClamp: 2, WebkitBoxOrient: 'vertical' }}>
                          <span style={{ fontWeight: 'bold', color: labelColor, marginRight: '6px' }}>{isGood ? '【GOOD】' : '【ISSUE】'}</span>
                          {isGood ? (typeof item.summary === 'string' ? item.summary : JSON.stringify(item.summary)) : (typeof item.bottleneck === 'string' ? item.bottleneck : JSON.stringify(item.bottleneck))}
                        </div>
                      </div>
                    );
                  })}
                </div>
              ) : (
                <div style={{ color: '#888', fontStyle: 'italic', margin: 'auto', textAlign: 'center', padding: '2rem' }}>
                  AI評価のあるロープレデータがまだありません
                </div>
              )}
            </div>
          </div>

          {/* 下部: 履歴一覧 */}
          <div className="history-section glass-container" style={{ padding: '20px', overflowY: 'auto' }}>
            <h2 className="title-cyber" style={{ color: 'var(--color-primary)', marginBottom: '1rem' }}>HISTORY</h2>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(320px, 1fr))', gap: '15px' }}>
              {myLogs.length > 0 ? myLogs.map((log, i) => (

                    <div style={{ display: 'flex', gap: '8px', alignItems: 'center', flexShrink: 0 }}>

                    {log['詳細JSON'] && <div style={{ fontSize: '0.75rem', color: 'black', background: 'var(--color-primary)', padding: '4px 10px', borderRadius: '12px', fontWeight: 'bold' }}>詳細ログを見る</div>}

    };

    const BattleScreen = ({ myName, selectedNode, onBattleComplete, isSubmitting }) => {
      const [formData, setFormData] = useState({ partner: '', type: '通常', passed: true, feedback: '' });
      return (
        <div className="battle-container animation-fade-in">

            <div style={{ marginBottom: '2rem', textAlign: 'center' }}>
              <div className="status-badge" style={{ background: 'var(--color-gold)', color: 'black', padding: '4px 12px' }}>{selectedNode?.label} - {selectedNode?.bossName}</div>

            <div className="form-group"><label className="form-label">合否</label><select className="form-control" value={formData.passed} onChange={e => setFormData({ ...formData, passed: e.target.value === 'true' })}><option value="true">合格 (CLEAR)</option><option value="false">不合格 (FAILED)</option></select></div>
            <button className="btn-danger" style={{ width: '100%', marginTop: '2rem', padding: '1rem', animation: formData.passed ? 'bg-pulse 2s infinite' : 'none' }} onClick={() => onBattleComplete({ ...formData, isBossBattle: true, level: selectedNode?.level, isLevelUp: formData.passed })} disabled={isSubmitting}>{isSubmitting ? '保存中...' : (formData.passed ? '✨ 合格にして次の階層へ進む' : '記録を保存 🏁')}</button>
          </div>
        </div>
      );
    };

    // 5. Gacha Config (Removed)

    // 6. AI Result Modal
    const AIResultModal = ({ result, onClose }) => {
      if (!result) return null;
      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal-box glass-container animation-fade-in" style={{ maxWidth: '600px', width: '90%' }} onClick={e => e.stopPropagation()}>
            <h2 className="title-cyber" style={{ color: result.R_phase_evaluation.is_passed ? 'var(--color-primary)' : 'var(--color-secondary)' }}>
              {result.R_phase_evaluation.is_passed ? '🎉 AI CLEAR!' : '⚡️ AI FAILED'}
            </h2>
            <div style={{ fontSize: '3rem', fontWeight: '900', textAlign: 'center', margin: '1rem 0' }}>{result.R_phase_evaluation.total_score}<span style={{ fontSize: '1rem' }}>pt</span></div>
            <div style={{ padding: '1rem', background: 'rgba(0,0,0,0.4)', borderRadius: '10px', maxHeight: '300px', overflowY: 'auto' }}>

              <p style={{ fontSize: '0.9rem' }}>{result.summary}</p>
